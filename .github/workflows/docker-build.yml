
name: Build and Publish Docker Image to GHCR

# main 브랜치에 코드가 push될 때마다 실행됩니다.
on:
  push:
    branches:
      - master

# 환경 변수 설정
env:
  REGISTRY: ghcr.io
  # github.repository는 "계정명/저장소명" 형태로 자동 할당됩니다. (대소문자 구분에 주의하세요)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    # GHCR에 이미지를 push하기 위해 필요한 권한입니다.
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 멀티 아키텍처 빌드를 위한 QEMU 에뮬레이터 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Docker Buildx 설정 (멀티 아키텍처 빌드 도구)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. GHCR 로그인
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Docker 이미지 태그 및 메타데이터 추출
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # 6. Docker 이미지 빌드 및 푸시 (amd64, arm64 모두 포함)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 여기서 두 가지 아키텍처를 지정합니다.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max